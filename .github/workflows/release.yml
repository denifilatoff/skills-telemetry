name: release

# Build the skills-telemetry CLI binary for every supported target and publish them to a
# GitHub Release. Triggered by pushing a v* tag, or run manually with an
# explicit version. The version is baked in via -X main.version and the asset
# names match what bootstrap.sh downloads: skills-telemetry-<os>-<arch>.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build, e.g. v0.1.0'
        required: true

permissions:
  contents: read

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - name: Test
        working-directory: cli
        run: go test ./...

  build:
    needs: test
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          name="skills-telemetry-${GOOS}-${GOARCH}"
          [ "$GOOS" = windows ] && name="${name}.exe"
          mkdir -p ../dist
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "../dist/${name}" .
      - uses: actions/upload-artifact@v4
        with:
          name: skills-telemetry-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Stage bootstrap scripts
        # Publish the launchers as release assets so the provisioning one-liner
        # has a stable URL: releases/latest/download/bootstrap.sh. Stamp the
        # release tag into BINARY_VERSION so each release's launcher pins its own
        # binary — it cannot lag behind a hardcoded value.
        run: |
          src=agent-packages/qubership-skills-telemetry/.apm/hooks/scripts
          sed "s|^BINARY_VERSION=.*|BINARY_VERSION=\"${VERSION}\"|" "$src/bootstrap.sh" > dist/bootstrap.sh
          sed "s|^\$BinaryVersion = .*|\$BinaryVersion = '${VERSION}'|" "$src/bootstrap.ps1" > dist/bootstrap.ps1
      - name: Checksums
        working-directory: dist
        run: sha256sum skills-telemetry-* > SHA256SUMS
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$VERSION" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$VERSION" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$VERSION" \
              --generate-notes
          fi

  sync-repo:
    # After a tagged release, rewrite the version references that point at the
    # release so they never have to be edited by hand: the package pin in the
    # README and the committed bootstrap BINARY_VERSION (the value APM deploys).
    # The package's own apm.yml version is a separate scheme and is left alone.
    needs: release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
      - name: Sync version references to ${{ env.VERSION }}
        run: |
          sed -i -E "s|(qubership-skills-telemetry)#v[0-9]+\.[0-9]+\.[0-9]+|\1#${VERSION}|g" README.md
          src=agent-packages/qubership-skills-telemetry/.apm/hooks/scripts
          sed -i "s|^BINARY_VERSION=.*|BINARY_VERSION=\"${VERSION}\"|" "$src/bootstrap.sh"
          sed -i "s|^\$BinaryVersion = .*|\$BinaryVersion = '${VERSION}'|" "$src/bootstrap.ps1"
      - name: Commit if changed
        run: |
          if git diff --quiet; then
            echo "version references already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): sync version references to ${VERSION} [skip ci]"
          git push
