name: skills-telemetry-backend

services:
  victorialogs:
    image: victoriametrics/victoria-logs:v1.16.0-victorialogs
    command:
      - -storageDataPath=/vlogs
      - -retentionPeriod=${VL_RETENTION}
    volumes:
      - vlogs-data:/vlogs
    networks:
      - backend
    restart: unless-stopped

  collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    networks:
      - backend
    depends_on:
      - victorialogs
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS}
      - CADDY_TLS=${CADDY_TLS}
      - INGEST_TOKEN=${INGEST_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - backend
    depends_on:
      - collector
    restart: unless-stopped

networks:
  backend:

volumes:
  vlogs-data:
  caddy-data:
  caddy-config:
